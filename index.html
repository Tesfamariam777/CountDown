<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Launch Countdown</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            text-align: center;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 2rem;
            font-weight: 600;
        }

        .countdown {
            display: flex;
            gap: 2rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }

        .time-box {
            background: rgba(0, 0, 0, 0.3);
            padding: 1.5rem;
            border-radius: 15px;
            min-width: 120px;
        }

        .time-number {
            font-size: 3.5rem;
            font-weight: bold;
            line-height: 1;
        }

        .time-label {
            font-size: 1rem;
            margin-top: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.9;
        }

        .launch-date {
            font-size: 1.2rem;
            opacity: 0.9;
            margin-top: 1rem;
        }

        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            .time-box { min-width: 70px; padding: 1rem; }
            .time-number { font-size: 2rem; }
            .time-label { font-size: 0.8rem; }
            .countdown { gap: 1rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎉 App Launching Soon 🎉</h1>
        <div class="countdown">
            <div class="time-box">
                <div class="time-number" id="days">00</div>
                <div class="time-label">Days</div>
            </div>
            <div class="time-box">
                <div class="time-number" id="hours">00</div>
                <div class="time-label">Hours</div>
            </div>
            <div class="time-box">
                <div class="time-number" id="minutes">00</div>
                <div class="time-label">Minutes</div>
            </div>
            <div class="time-box">
                <div class="time-number" id="seconds">00</div>
                <div class="time-label">Seconds</div>
            </div>
        </div>
        <div class="launch-date">
            📅 Sunday, April 19, 2026 @ 6:00 PM
        </div>
    </div>

    <script>
        // Set the launch date (April 19, 2026 at 6:00 PM)
        const launchDate = new Date(2026, 3, 19, 18, 0, 0); // Month is 0-indexed (3 = April)

        function updateCountdown() {
            const now = new Date();
            const difference = launchDate - now;

            if (difference <= 0) {
                // Launch time has arrived
                document.getElementById('days').textContent = '00';
                document.getElementById('hours').textContent = '00';
                document.getElementById('minutes').textContent = '00';
                document.getElementById('seconds').textContent = '00';
                
                // Show a launch message
                const container = document.querySelector('.container');
                container.innerHTML = `
                    <h1>🚀 We're Live! 🚀</h1>
                    <div class="launch-date">The app has launched!</div>
                `;
                return;
            }

            // Calculate time units
            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);

            // Update the display with leading zeros
            document.getElementById('days').textContent = days.toString().padStart(2, '0');
            document.getElementById('hours').textContent = hours.toString().padStart(2, '0');
            document.getElementById('minutes').textContent = minutes.toString().padStart(2, '0');
            document.getElementById('seconds').textContent = seconds.toString().padStart(2, '0');
        }

        // Update every second
        updateCountdown();
        setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
